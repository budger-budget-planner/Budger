name: Sync deploy trigger

# Fires only when export/README.md itself changes.
# The files this action writes (export/frontend/README.md,
# export/backend/README.md) don't match this path, so there is no loop.
on:
  push:
    branches: [main]
    paths:
      - 'export/README.md'

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy export/README.md into frontend and backend roots
        run: |
          cp export/README.md export/frontend/README.md
          cp export/README.md export/backend/README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add export/frontend/README.md export/backend/README.md
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: sync deploy trigger to frontend + backend"
          git push
