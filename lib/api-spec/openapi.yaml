openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Finance Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: categories
    description: Spending categories
  - name: transactions
    description: Financial transactions
  - name: households
    description: Household management
  - name: invites
    description: Household invites
  - name: notifications
    description: Notification settings
  - name: summary
    description: Dashboard summaries
  - name: goals
    description: Financial goals

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: Email already in use

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
        "404":
          description: No account found for this email

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories for the current user/household
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions with optional filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a new transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
    patch:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdate"
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /transactions/{id}/receipt:
    post:
      operationId: uploadReceipt
      tags: [transactions]
      summary: Attach a receipt image to a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiptInput"
      responses:
        "200":
          description: Updated transaction with receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    delete:
      operationId: deleteReceipt
      tags: [transactions]
      summary: Remove a receipt image from a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated transaction without receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /households:
    get:
      operationId: getHousehold
      tags: [households]
      summary: Get current user's household
      responses:
        "200":
          description: Household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
        "404":
          description: No household
    post:
      operationId: createHousehold
      tags: [households]
      summary: Create a household
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdInput"
      responses:
        "201":
          description: Created household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"
    patch:
      operationId: updateHousehold
      tags: [households]
      summary: Update household
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdUpdate"
      responses:
        "200":
          description: Updated household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"

  /households/members:
    get:
      operationId: listHouseholdMembers
      tags: [households]
      summary: List household members
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HouseholdMember"

  /households/members/{userId}/spending:
    get:
      operationId: getMemberSpending
      tags: [households]
      summary: Get spending breakdown for a specific household member this month
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member spending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySpending"
        "403":
          description: Dashboard blocked by user

  /households/members/{userId}:
    delete:
      operationId: removeHouseholdMember
      tags: [households]
      summary: Remove a household member
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /households/members/{userId}/role:
    patch:
      operationId: updateMemberRole
      tags: [households]
      summary: Update a household member's role (head only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberRoleUpdate"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdMember"
        "403":
          description: Not authorized

  /households/leave:
    post:
      operationId: leaveHousehold
      tags: [households]
      summary: Leave the current household
      responses:
        "200":
          description: Left household

  /invites:
    post:
      operationId: createInvite
      tags: [invites]
      summary: Invite someone to the household
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteInput"
      responses:
        "201":
          description: Created invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
        "422":
          description: User not found or already in a household
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteError"
    get:
      operationId: listInvites
      tags: [invites]
      summary: List pending invites for the household
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"

  /invites/incoming:
    get:
      operationId: listIncomingInvites
      tags: [invites]
      summary: List pending invites addressed to the current user's email
      responses:
        "200":
          description: Incoming invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"

  /invites/{token}/accept:
    post:
      operationId: acceptInvite
      tags: [invites]
      summary: Accept a household invite
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accepted invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Household"

  /invites/{token}/decline:
    post:
      operationId: declineInvite
      tags: [invites]
      summary: Decline a household invite
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Declined

  /invites/{token}:
    get:
      operationId: getInvite
      tags: [invites]
      summary: Get invite info by token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
        "404":
          description: Invite not found or expired
    delete:
      operationId: cancelInvite
      tags: [invites]
      summary: Cancel an invite
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Cancelled

  /notifications:
    get:
      operationId: getNotificationSettings
      tags: [notifications]
      summary: Get notification settings for current user
      responses:
        "200":
          description: Notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
    put:
      operationId: updateNotificationSettings
      tags: [notifications]
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettingsInput"
      responses:
        "200":
          description: Updated notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List active goals for the current user/household
      responses:
        "200":
          description: List of active goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a new goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Created goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /goals/past:
    get:
      operationId: listPastGoals
      tags: [goals]
      summary: List past (expired) goals
      responses:
        "200":
          description: List of past goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"

  /goals/{id}:
    patch:
      operationId: updateGoal
      tags: [goals]
      summary: Update a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalUpdate"
      responses:
        "200":
          description: Updated goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /goal-contributions:
    get:
      operationId: listGoalContributions
      tags: [goals]
      summary: List goal contributions for current month
      parameters:
        - name: month
          in: query
          schema:
            type: string
        - name: goalId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of contributions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalContribution"
    post:
      operationId: createGoalContribution
      tags: [goals]
      summary: Add a goal contribution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalContributionInput"
      responses:
        "201":
          description: Created contribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalContribution"

  /goal-contributions/{id}:
    delete:
      operationId: deleteGoalContribution
      tags: [goals]
      summary: Delete a goal contribution
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /summary/goals:
    get:
      operationId: getGoalsSummary
      tags: [summary]
      summary: Get goal contribution totals per goal for current month
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Goals summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalSummary"

  /summary/spending:
    get:
      operationId: getSpendingSummary
      tags: [summary]
      summary: Get spending summary by category for a period
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Spending summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySpending"

  /summary/monthly:
    get:
      operationId: getMonthlySummary
      tags: [summary]
      summary: Get monthly spending totals for the last 6 months
      responses:
        "200":
          description: Monthly totals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTotal"

  /summary/history:
    get:
      operationId: getSpendingHistory
      tags: [summary]
      summary: Get all completed months spending history with category breakdown
      responses:
        "200":
          description: Spending history by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthHistory"

  /summary/recent:
    get:
      operationId: getRecentActivity
      tags: [summary]
      summary: Get recent transactions with enriched data
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        email:
          type: string
        status:
          type: string
        firstLoginDone:
          type: boolean
        totalBudget:
          type: ["number", "null"]
        householdId:
          type: ["integer", "null"]
        dashboardBlocked:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - status
        - firstLoginDone
        - totalBudget
        - householdId
        - dashboardBlocked
        - createdAt

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        dashboardBlocked:
          type: boolean
        totalBudget:
          type: ["number", "null"]

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    RegisterInput:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 4

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        icon:
          type: string
        budget:
          type: ["number", "null"]
        userId:
          type: ["integer", "null"]
        householdId:
          type: ["integer", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - color
        - icon
        - budget
        - userId
        - householdId
        - createdAt

    CategoryInput:
      type: object
      required:
        - name
        - color
        - icon
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
        icon:
          type: string
        budget:
          type: ["number", "null"]

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
        icon:
          type: string
        budget:
          type: ["number", "null"]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        description:
          type: string
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        categoryIcon:
          type: ["string", "null"]
        date:
          type: string
        paymentMethod:
          type: string
        receiptImage:
          type: ["string", "null"]
        userId:
          type: integer
        householdId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - amount
        - description
        - categoryId
        - categoryName
        - categoryColor
        - categoryIcon
        - date
        - paymentMethod
        - receiptImage
        - userId
        - householdId
        - userName
        - createdAt

    TransactionInput:
      type: object
      required:
        - amount
        - description
        - date
        - paymentMethod
      properties:
        amount:
          type: number
        description:
          type: string
        categoryId:
          type: ["integer", "null"]
        date:
          type: string
        paymentMethod:
          type: string
        receiptImage:
          type: ["string", "null"]

    TransactionUpdate:
      type: object
      properties:
        amount:
          type: number
        description:
          type: string
        categoryId:
          type: ["integer", "null"]
        date:
          type: string
        paymentMethod:
          type: string
        receiptImage:
          type: ["string", "null"]

    ReceiptInput:
      type: object
      required:
        - imageData
      properties:
        imageData:
          type: string
          description: Base64-encoded image data URL

    Household:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        ownerId:
          type: integer
        budget:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - ownerId
        - budget
        - createdAt

    HouseholdInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        budget:
          type: ["number", "null"]

    HouseholdUpdate:
      type: object
      properties:
        name:
          type: string
        budget:
          type: ["number", "null"]

    HouseholdMember:
      type: object
      properties:
        userId:
          type: integer
        householdId:
          type: integer
        role:
          type: string
        name:
          type: string
        email:
          type: string
        memberColor:
          type: string
        monthlySpent:
          type: number
        dashboardBlocked:
          type: boolean
        joinedAt:
          type: string
      required:
        - userId
        - householdId
        - role
        - name
        - email
        - memberColor
        - monthlySpent
        - dashboardBlocked
        - joinedAt

    Invite:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        token:
          type: string
        householdId:
          type: integer
        householdName:
